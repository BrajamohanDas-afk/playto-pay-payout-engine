services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playto_pay
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playto -d playto_pay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo_data &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://playto:playto@postgres:5432/playto_pay
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PAYOUT_SIMULATOR_MODE: ${PAYOUT_SIMULATOR_MODE:-random}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    environment:
      DATABASE_URL: postgres://playto:playto@postgres:5432/playto_pay
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      PAYOUT_SIMULATOR_MODE: ${PAYOUT_SIMULATOR_MODE:-random}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build:
      context: ./backend
    command: celery -A config beat -l info
    environment:
      DATABASE_URL: postgres://playto:playto@postgres:5432/playto_pay
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      PAYOUT_SIMULATOR_MODE: ${PAYOUT_SIMULATOR_MODE:-random}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
